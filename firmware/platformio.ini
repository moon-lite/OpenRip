; OpenRip firmware — Seeed XIAO ESP32-C3
; Default env is serial-only (M0). The ble-stub env compiles the M1 BLE
; GATT stub to keep it from bit-rotting; it is not the M0 target.

[platformio]
default_envs = m0-serial

[env]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
; chain+ evaluates preprocessor conditionals, so the serial-only env doesn't
; pull in the BLE library hidden behind OPENRIP_ENABLE_BLE.
lib_ldf_mode = chain+

[env:m0-serial]

[env:ble-stub]
build_flags = -DOPENRIP_ENABLE_BLE
