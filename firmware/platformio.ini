; OpenRip firmware — Seeed XIAO ESP32-C3
; Default env is serial-only (M0). The v01-device env is the M1 build:
; BLE launch records plus idle deep sleep.

[platformio]
default_envs = m0-serial

[env]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
monitor_speed = 115200
; chain+ evaluates preprocessor conditionals, so the serial-only env doesn't
; pull in the BLE library hidden behind OPENRIP_ENABLE_BLE.
lib_ldf_mode = chain+

[env:m0-serial]

; M1 device build: BLE launch records + idle deep sleep.
[env:v01-device]
build_flags =
    -DOPENRIP_ENABLE_BLE
    -DOPENRIP_ENABLE_SLEEP
